let menuBtns=[],menuIdx=0,menuCancel=null;
function bindBtns(container,cancelFn){
  menuBtns=[...container.querySelectorAll('button.gbtn')];
  menuIdx=menuBtns.findIndex(b=>!b.disabled);if(menuIdx<0)menuIdx=0;
  menuCancel=cancelFn||null;setFocus();
}
function setFocus(){menuBtns.forEach((b,i)=>{b.classList.toggle('focused',i===menuIdx);if(i===menuIdx&&b.scrollIntoView)b.scrollIntoView({block:'nearest'});});}
function menuKey(k){
  if(!menuBtns.length)return;
  if(['ArrowRight','ArrowDown','d','s'].includes(k)){let g=0;do{menuIdx=(menuIdx+1)%menuBtns.length;}while(menuBtns[menuIdx].disabled&&++g<20);setFocus();}
  if(['ArrowLeft','ArrowUp','a','w'].includes(k)){let g=0;do{menuIdx=(menuIdx-1+menuBtns.length)%menuBtns.length;}while(menuBtns[menuIdx].disabled&&++g<20);setFocus();}
}
function clickFocused(){const b=menuBtns[menuIdx];if(b&&!b.disabled)b.click();}
function openMenu(msg,items,cancelFn){
  if(MODE==='map')MODE='menu';
  $('menuMsg').innerHTML=msg;
  const box=$('menuBtns');box.innerHTML='';
  items.forEach(it=>{
    const b=document.createElement('button');b.className='gbtn';b.innerHTML=it.label;
    if(it.disabled)b.disabled=true;
    b.addEventListener('click',()=>{if(!b.disabled){sfx.ok();it.fn();}});
    box.appendChild(b);
  });
  bindBtns(box,cancelFn);
  $('menuBox').style.display='block';
}
function closeMenu(){$('menuBox').style.display='none';$('menuBtns').innerHTML='';menuBtns=[];menuCancel=null;}

function tileAt(x,y){const m=M();if(x<0||y<0||x>=m.w||y>=m.h)return null;return m.tiles[y][x];}
function npcAt(x,y){return (NPCS[CUR]||[]).find(n=>n.x===x&&n.y===y&&(!n.cond||n.cond()));}
function passable(x,y){const t=tileAt(x,y);return t!==null&&!SOLID[t]&&!npcAt(x,y);}
function tryMove(){
  if(P.moving||!dirHeld)return;
  P.dir=dirHeld;
  const dd={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[dirHeld];
  const nx=P.x+dd[0],ny=P.y+dd[1];
  if(!passable(nx,ny))return;
  P.tx=nx;P.ty=ny;P.moving=true;P.mt=0;
}

async function goMap(to,x,y,d){
  MODE='flash';flashColor='rgba(0,0,0,1)';

  CUR=to;P.x=x;P.y=y;P.tx=x;P.ty=y;P.fx=x*TILE;P.fy=y*TILE;P.moving=false;if(d)P.dir=d;
  toast=M().name;toastT=performance.now();

function stepDone(){
  P.x=P.tx;P.y=P.ty;P.fx=P.x*TILE;P.fy=P.y*TILE;P.moving=false;
  const wp=(WALKP[CUR]||{})[P.x+','+P.y];
  if(wp){
    if(wp.lock&&wp.lock()){sfx.ok();showDialog('',wp.msg||['잠겨 있다.']);return;}
    goMap(wp.to,wp.x,wp.y,wp.d);return;
  }
  if(CUR==='quad'&&tileAt(P.x,P.y)==='G'&&Math.random()<1/40){catEvent();return;}
  const z=encFor();
  if(z&&z.tiles.includes(tileAt(P.x,P.y))&&Math.random()<z.rate*(S.encDown?0.8:1)*(S.title==='scholar'?0.9:1))startEncounter();

}

function tryInteract(){
  const f=facingTile();
  const npc=npcAt(f.x,f.y);
  if(npc){npcTalk(npc.kind);return;}
  const dp=(DOORP[CUR]||{})[f.x+','+f.y];
  const t=tileAt(f.x,f.y);
  if(dp&&t==='D'){
    if(dp.lock&&dp.lock()){sfx.ok();showDialog('',dp.msg||['잠겨 있다.']);return;}
    sfx.ok();goMap(dp.to,dp.x,dp.y,dp.d);return;
  }
  if(t==='L'){labMenu();return;}
  if(t==='E'){dormMenu();return;}
  if(t==='W'){sfx.ok();showDialog('',['좌판에 술병이 가지런히 놓여 있다.','점주에게 말을 걸자.']);return;}
  if(t==='A'){travelMenu();return;}
  if(t==='H'){hiddenPagoda(f.x,f.y);return;}
  if(t==='V'){vendingShop(CUR==='prelim'?['miller','yuengling']:(CUR==='jobhall'?['yuengling','barbaresco','nightshift']:['soju','beer']));return;}
  if(t==='O'){sfx.heal();openFieldMenu();fmView('save');return;}
  if(t==='X'){openChest(f.x,f.y);return;}
  if(t==='J'){if(CUR==='prelim')prelimJudge();else if(CUR==='jobhall')jobhallCommittee();else hallJudge();return;}
  if(t==='S'){sfx.ok();showDialog('',['계단이다. 밟으면 이동한다.']);return;}
}

function fishingAct(){
  if(!FISH)return;

  if(d<0.045)grade='전설';else if(d<0.13)grade='희귀';else if(d<0.30)grade='일반';else grade='잡템';
  if(grade==='전설'&&Math.random()<0.5)grade='희귀'; // 전설은 정중앙+추가 확률
  const pool=FISH_BY_GRADE[grade];
  const key=pool[Math.floor(Math.random()*pool.length)];
  const f=FISH_DB[key];
  const first=!S.fish[key];
  S.fish[key]=(S.fish[key]||0)+1;
  P.gold+=f.gold;updateHud();
  FISH=null;MODE='map';
  sfx[grade==='잡템'?'crash':'lvl']();
  const lines=[];
  if(grade==='잡템')lines.push('…뭔가 걸렸다. 끌어올려 보니 〈'+f.n+'〉.');
  else lines.push('<b style="color:#ffd866">'+grade+'</b> — 〈'+f.n+'〉을(를) 낚았다!');

function openShopWith(stock,title,greet){
  sfx.ok();

  const head=m=>'<b style="color:#ffd866">'+title+'</b> — '+m+'<br><span style="color:#aab;font-size:12px">'+inv()+' · '+fmt(P.gold)+'</span>';
  const build=msg=>openMenu(head(msg),
    stock.map(k=>({label:ITEMS[k].name+(BUYQ>1?' ×'+BUYQ:'')+' ('+fmt(shopPrice(k)*BUYQ)+(S.cafeStamp?' <span style="color:#56d364">▼</span>':'')+') <small>'+ITEMS[k].short+'</small>',disabled:P.gold<shopPrice(k)*BUYQ,
      fn:()=>{P.gold-=shopPrice(k)*BUYQ;P.inv[k]+=BUYQ;S.bought++;updateHud();build('좋은 선택이야.');}}))

    ()=>{closeMenu();MODE='map';});
  build(greet);
}

function revEnemies(floor){

  }

    phase:n=>n===1?[mkE2('judge','이론 심사위원',{hp:450,atk:40,def:18,spd:14})]
      :n===2?[mkE2('judge2','사료 심사위원 A',{hp:380,atk:46,def:18,spd:15}),mkE2('judge2','사료 심사위원 B',{hp:380,atk:46,def:18,spd:15})]

    p3msg:['질문이 잦아든다…','<b>— 최종: 학장 면담 —</b> 학장이 천천히 입을 연다. 「예산이라는 게 말이죠…」'],
    phase:n=>n===1?[mkE('cchair')]
      :n===2?[mkE('cext',' A'),mkE('cext',' B')]
      :[mkE('cdean')]
  }
};
async function startBoss(kind){
  kind=kind||'ms';
  MODE='flash';sfx.enc();flashColor='rgba(0,0,0,.82)';
  for(let i=0;i<3;i++){flashOn=true;await sleep(110);flashOn=false;await sleep(80);}
  B={enemies:BOSS_DEF[kind].phase(1),boss:true,bossKind:kind,phase:1,over:false,spiked:false};
  MODE='battle';BFX.length=0;
  bossLoop();
}
function bmsg(text,ms=720){return new Promise(res=>{
  $('menuBtns').innerHTML='';menuBtns=[];menuCancel=null;
  $('menuMsg').innerHTML=text;$('menuBox').style.display='block';
  setTimeout(res,Math.max(16,ms/SPEED));
});}
function bchoice(msg,items,cancelable){return new Promise(res=>{
  openMenu(msg,items.map(it=>({label:it.label,disabled:it.disabled,fn:()=>res(it.value)})),cancelable?()=>res('__cancel__'):null);
});}
function alive(){return B.enemies.filter(e=>e.hp>0);}
function fxAdd(type,e){BFX.push({type,e,t0:performance.now()});}
function tallyBank(){
  B.enemies.forEach(e=>{
    if(B.bank){B.bank.xp+=e.xp;B.bank.gold+=e.gold;}
    if(e.key==='slime')S.slimeKills++;else if(e.key==='spirit')S.spiritKills++;
    if(CUR==='asianlib'&&!S.bansae&&S.saryo<3&&Math.random()<0.25){S.saryo++;B._saryoDrop=(B._saryoDrop||0)+1;}
    S.dex[e.key]=1;
    for(const tid in TROPHIES){
      const t=TROPHIES[tid];
      if(t.src===e.key&&!S.trophies[tid]&&Math.random()<t.rate){S.trophies[tid]=1;(B._tro=B._tro||[]).push(t.n);}
    }
  });
}
async function battleLoop(){
  if(B.intro)await bmsg(B.intro,900);
  else{
    const names=[...new Set(B.enemies.map(e=>e.name.replace(/ [A-C]$/,'')))].join('과(와) ');
    await bmsg(names+'이(가) 나타났다!');
  }
  if(B.enemies.some(e=>e.preempt)&&Math.random()<0.3){
    await bmsg('카톡 알림이 쉴 새 없이 울린다! 기습이다!');
    for(const e of alive()){await enemyAct(e);if(P.hp<=0)return defeat();}
  }
  while(true){
    const act=await playerCommand();
    if(act.type==='run'){
      if(B.noRun){await bmsg(B.noRunMsg||'도망칠 수 없다!');continue;}
      const ms=Math.max(...alive().map(e=>eSpdNow(e)));
      const rc=Math.min(1,0.7+Math.max(0,pSpdNow()-ms)*0.05+(S.title==='vet'?0.1:0));
      if(Math.random()<rc){
        await bmsg(rc>=1?'압도적인 마감력 — 여유롭게 읽씹하고 자리를 떴다.':'읽씹하고 자리를 떴다…');
        return endBattle();
      }
      await bmsg('도망칠 수 없다! 알림은 어디든 따라온다!');
    }
    const order=[{p:true,spd:pSpdNow()},...alive().map(e=>({e,spd:eSpdNow(e)}))].sort((a,b)=>b.spd-a.spd);
    for(const o of order){
      if(B.over)break;
      if(o.p){if(act.type!=='run')await playerAct(act);}
      else if(o.e.hp>0){await enemyAct(o.e);if(P.hp<=0)return defeat();}
      if(!alive().length)break;
    }
    if(!alive().length){
      tallyBank();
      if(B.waves&&B.waves.length){
        sfx.enc();
        await bmsg(B.waveMsg||'다음 상대가 나타났다!',900);
        B.enemies=mkGroup(B.waves.shift());
        roundEnd();continue;
      }
      return victoryFinal();
    }
    roundEnd();
  }
}
function roundEnd(){
  if(S.chests['union4:11,4']&&P.mp<P.maxmp){P.mp=Math.min(P.maxmp,P.mp+5);updateHud();}
  if(P.buffGyeong>0)P.buffGyeong--;
  if(P.buffAtk>0)P.buffAtk--;
  if(P.debuffAtk>0)P.debuffAtk--;
  if(P.silence>0)P.silence--;
  if(P.slow>0)P.slow--;
  if(P.confuse>0)P.confuse--;
  if(P.mpLeak>0){P.mp=Math.max(0,P.mp-6);P.mpLeak--;updateHud();}
  if(S.bell){if(P.slow>0)P.slow--;if(P.confuse>0)P.confuse--;if(P.silence>0)P.silence--;if(P.mpLeak>0)P.mpLeak--;} // 루카스의 방울: 디버프 지속 절반
  P.counter=false;
  if(B){
    B.spiked=false;
    B.enemies.forEach(e=>{if(e.weak>0)e.weak--;if(e.noGuard>0)e.noGuard--;if(e.debAtk>0)e.debAtk--;if(e.debSpd>0)e.debSpd--;});
  }
}
async function bossLoop(){
  const BD=BOSS_DEF[B.bossKind];
  await bmsg(BD.intro[0],950);
  await bmsg(BD.intro[1]);
  while(true){
    const act=await playerCommand();
    if(act.type==='run'){await bmsg('「앉으세요.」 — 심사 중에는 도망칠 수 없다!');continue;}
    const order=[{p:true,spd:pSpdNow()},...alive().map(e=>({e,spd:eSpdNow(e)}))].sort((a,b)=>b.spd-a.spd);
    for(const o of order){
      if(B.over)break;
      if(o.p)await playerAct(act);
      else if(o.e.hp>0){await enemyAct(o.e);if(P.hp<=0)return defeat();}
      if(!alive().length)break;
    }
    if(!alive().length){
      B.enemies.forEach(e=>{S.dex[e.key]=1;});
      if(B.phase===1){
        B.phase=2;sfx.enc();
        await bmsg(BD.p2msg[0],950);
        await bmsg(BD.p2msg[1]);
        B.enemies=BD.phase(2);
      }else if(B.phase===2){
        B.phase=3;sfx.enc();
        await bmsg(BD.p3msg[0],950);
        await bmsg(BD.p3msg[1],950);
        B.enemies=BD.phase(3);
      }else{
        return B.bossKind==='phd'?phdVictory():(B.bossKind==='committee'?committeeVictory():bossVictory());
      }
    }
    roundEnd();
  }
}
function defNow(){return P.buffGyeong>0?P.def*2:P.def;}
async function playerCommand(){
  while(true){
    const tags=[];
    if(P.buffGyeong>0)tags.push('<span style="color:#7fc4ff">거경 '+P.buffGyeong+'턴</span>');
    if(P.debuffAtk>0)tags.push('<span style="color:#f0a0a0">기죽음 ATK↓</span>');
    if(P.buffAtk>0)tags.push('<span style="color:#ffd866">경세 ATK↑ '+P.buffAtk+'턴</span>');
    if(P.silence>0)tags.push('<span style="color:#f0d080">침묵(스킬 불가)</span>');
    if(P.slow>0)tags.push('<span style="color:#9cc4ea">둔화 SPD↓ '+P.slow+'턴</span>');
    if(P.mpLeak>0)tags.push('<span style="color:#c8a0f0">MP누수 −6/턴 '+P.mpLeak+'턴</span>');
    if(P.confuse>0)tags.push('<span style="color:#f0c060">혼란 '+P.confuse+'턴</span>');
    if(P.overwork>0)tags.push('<span style="color:#f09595">과로 ×'+P.overwork+' (피해 +'+(P.overwork*8)+'%)</span>');
    const status='<span style="color:#aab;font-size:12px">HP '+P.hp+'/'+P.maxhp+' · MP '+P.mp+'/'+P.maxmp+(tags.length?' · '+tags.join(' · '):'')+'</span>';
    const top=await bchoice('어떻게 할까? '+status,[
      {label:'액션',value:'action'},{label:'아이템',value:'item'},{label:'도주',value:'run'}
    ]);
    if(top==='run')return{type:'run'};
    if(top==='action'){
      const MULT={gyeokmul:[1.8],jihaeng:[2.2],haeche:[1.8,true],sadan:[0.55,false,'×4'],igi:[1.0,false,'전체'],dongdo:[1.6,false,'전체'],bakhak:[2.6],beopgo:[1.3,false,'전체'],hwalyeon:[3.0,true]};
      const info=id=>{
        const s=SKILLS[id];
        if(id==='ilgwan'){
          const sp=ilgwanSpend();
          return sp<5?'MP 부족':('MP'+sp+' 소모 · 약 '+dmgRange(ilgwanMult())+'뎀');
        }
        const m=MULT[id];
        let txt='MP'+s.mp;
        if(m)txt+=' · '+(m[2]?m[2]+' ':'')+'약 '+dmgRange(m[0],m[1])+'뎀'+(m[2]==='×4'?'/타':'');
        else txt+=' · '+s.brief;
        return txt;
      };
      const acts=[{label:'평타 (논박) <small>약 '+dmgRange(1)+'뎀</small>',value:'attack'}];
      P.skills.forEach(id=>{
        const s=SKILLS[id];
        const mute=P.silence>0;
        const noMp=id==='ilgwan'?ilgwanSpend()<5:P.mp<s.mp;
        acts.push({label:s.name+' <small>'+(mute&&id!=='susin'?'침묵 <span style="color:#56d364">(수신제가로 해제 가능)</span>':info(id))+'</small>',value:'sk_'+id,disabled:id==='susin'?false:(mute||noMp)});
      });
      acts.push({label:'← 뒤로',value:'__cancel__'});
      const c=await bchoice('어떤 수로 갈까? <span style="color:#aab;font-size:11px">(예상뎀은 첫 번째 적 기준 · 크리티컬 제외)</span>',acts,true);
      if(c==='__cancel__')continue;
      const targeted={attack:'attack',sk_gyeokmul:'gyeokmul',sk_gungri:'gungri',sk_jihaeng:'jihaeng',sk_silsa:'silsa',sk_haeche:'haeche',sk_ilgwan:'ilgwan',sk_bakhak:'bakhak',sk_hwalyeon:'hwalyeon'};
      if(targeted[c]){
        const TM={attack:[1],gyeokmul:[1.8],jihaeng:[2.2],haeche:[1.8,true],ilgwan:[ilgwanMult()],silsa:null,gungri:null,bakhak:[2.6],hwalyeon:[3.0,true]};
        const t=await pickTarget(TM[targeted[c]]);if(t==='__cancel__')continue;
        return {type:targeted[c],target:t};
      }
      if(c==='sk_geogyeong')return{type:'geogyeong'};
      if(c==='sk_gakju')return{type:'gakju'};
      if(c==='sk_gyeongse')return{type:'gyeongse'};
      if(c==='sk_sadan')return{type:'sadan'};
      if(c==='sk_igi')return{type:'igi'};
      if(c==='sk_dongdo')return{type:'dongdo'};
      if(c==='sk_susin')return{type:'susin'};
      if(c==='sk_beopgo')return{type:'beopgo'};
    }
    if(top==='item'){
      const its=[];
      for(const k in ITEMS){
        if(P.inv[k]>0)its.push({label:ITEMS[k].name+' ×'+P.inv[k]+' <small>'+ITEMS[k].short+'</small>',value:k});
      }
      its.push({label:'← 뒤로',value:'__cancel__'});
      if(its.length===1){await bmsg('가방이 비었다. 논문 초고뿐이다.');continue;}
      const it=await bchoice('무엇을 마실까?',its,true);
      if(it==='__cancel__')continue;
      return {type:'item',item:it};
    }
  }
}
async function pickTarget(m){
  const a=alive();
  if(a.length===1)return a[0];
  const items=a.map(e=>({label:e.name+' <small>HP '+e.hp+(m?' · 약 '+dmgRange(m[0],m[1],e)+'뎀':'')+(e.weak>0?' · <span style="color:#ffd866">약점</span>':'')+'</small>',value:e}));
  items.push({label:'← 뒤로',value:'__cancel__'});
  return await bchoice('누구를 논파할까?',items,true);
}
function atkNow(){return Math.floor((P.atk+wpn().atk)*(P.debuffAtk>0?0.85:1)*(P.buffAtk>0?1.25:1));}
function dmgRange(mult,ig,tgt){
  const a=atkNow();
  const t=tgt||(B?B.enemies.filter(e=>e.hp>0)[0]:null);
  const def=ig?0:(t?t.def:0);
  let lo=Math.max(1,Math.floor(a*mult*0.9)-def),hi=Math.max(1,Math.floor(a*mult*1.1)-def);
  if(t&&t.weak>0){lo=Math.floor(lo*1.2);hi=Math.floor(hi*1.2);}
  return lo+'~'+hi;
}
function ilgwanSpend(){return Math.floor(P.mp/2);}
function ilgwanMult(){return Math.min(4,1+ilgwanSpend()*0.07);}
function hitChance(aspd,dspd){return Math.max(0.75,Math.min(0.98,0.92+(aspd-dspd)*0.012));}
function pSpdNow(){return P.slow>0?Math.max(1,P.spd-6):P.spd;}
function eSpdNow(e){return e.debSpd>0?Math.max(1,Math.floor(e.spd*0.75)):e.spd;}
function pMiss(t){return Math.random()>hitChance(pSpdNow(),t.spd);}
function eMiss(e){return Math.random()>hitChance(eSpdNow(e),pSpdNow());}
function lukGuard(d){if(Math.random()*100<P.luk+(S.title==='collector'?3:0))return{d:Math.max(1,Math.floor(d/2)),g:true};return{d,g:false};}
function enemyGuard(t,d){if(t.noGuard>0)return{d,g:false};if(t.guard&&Math.random()<t.guard)return{d:Math.max(1,Math.floor(d/2)),g:true};return{d,g:false};}
async function playerAct(act){
  if(P.hangover){
    P.hangover=false;sfx.crash();
    await bmsg('<b>숙취</b>로 머리가 띵하다… 아무것도 할 수 없었다!');
    return;
  }
  if(P.confuse>0&&act.type!=='item'&&Math.random()<0.35){
    sfx.crash();
    if(Math.random()<0.5)await bmsg('<b>혼란</b> — 머릿속이 빙빙 돈다! 논점을 잃고 헛손질을 하고 말았다!');
    else{
      const sd=Math.max(5,Math.floor(P.maxhp*0.05));
      P.hp=Math.max(1,P.hp-sd);updateHud();
      await bmsg('<b>혼란</b> — 허우적대다 스스로 넘어졌다! '+sd+'의 데미지…');
    }
    return;
  }
  if(act.type==='attack'||act.type==='gyeokmul'||act.type==='jihaeng'||act.type==='haeche'||act.type==='ilgwan'||act.type==='bakhak'||act.type==='hwalyeon'){
    let t=act.target;if(!t||t.hp<=0)t=alive()[0];if(!t)return;
    const CFG={attack:{mult:1.0},gyeokmul:{mult:1.8,mp:6},jihaeng:{mult:2.2,mp:10},haeche:{mult:1.8,mp:12,pierce:true},ilgwan:{},bakhak:{mult:2.6,mp:14},hwalyeon:{mult:3.0,mp:20,pierce:true}};
    const cfg=CFG[act.type];
    if(act.type==='ilgwan'){const sp=ilgwanSpend();cfg.mult=ilgwanMult();P.mp-=sp;cfg.spent=sp;updateHud();}
    else if(cfg.mp){P.mp-=cfg.mp;updateHud();}
    if(act.type==='gyeokmul'){
      bmsg('연구는 『주자어류』를 펼쳤다 — <b>격물치지!</b>',1);
      fxAdd('book',t);sfx.book();await sleep(620);
    }else if(act.type==='jihaeng'){
      bmsg('<b>지행합일(知行合一)!</b> 앎이 곧 일격이 된다!',1);
      fxAdd('book',t);fxAdd('slash',t);sfx.book();sfx.slash();await sleep(620);
    }else if(act.type==='haeche'){
      bmsg('<b>해체신서(解體新書)!</b> 논리의 구조를 해부한다!',1);
      fxAdd('scan',t);fxAdd('slash',t);sfx.slash();await sleep(520);
    }else if(act.type==='ilgwan'){
      bmsg('<b>일이관지(一以貫之)!</b> 논리 '+cfg.spent+'을(를) 한 점에 꿰뚫는다!',1);
      fxAdd('book',t);fxAdd('slash',t);fxAdd('wave',null);sfx.book();sfx.slash();await sleep(700);
    }else if(act.type==='bakhak'){
      bmsg('<b>박학심문(博學審問)!</b> 넓게 배운 것으로 깊이 찌른다!',1);
      fxAdd('book',t);fxAdd('slash',t);sfx.slash();await sleep(560);
    }else if(act.type==='hwalyeon'){
      bmsg('<b>활연관통(豁然貫通)!</b> 모든 것이 한 줄로 꿰뚫린다!',1);
      fxAdd('scan',t);fxAdd('slash',t);fxAdd('wave',null);sfx.book();sfx.slash();await sleep(700);
    }else{
      bmsg('연구의 논박! 펜이 번뜩인다!',1);
      fxAdd('slash',t);sfx.slash();await sleep(380);
    }
    if(pMiss(t)){await bmsg('…빗나갔다! '+t.name+'이(가) 몸을 피했다.');return;}
    let r=calcDmg(atkNow(),cfg.mult,cfg.pierce?0:t.def,P.luk,cfg.pierce);let d=r.d;
    if(t.weak>0)d=Math.floor(d*1.2);
    const gq=cfg.pierce?{d,g:false}:enemyGuard(t,d);d=gq.d;
    t.hp=Math.max(0,t.hp-d);t.shake=10;t.flash=6;sfx.hit();
    await bmsg(t.name+'에게 '+d+'의 데미지!'+(cfg.pierce?' <span style="color:#9fd">(방어·막기 무시)</span>':'')+(act.type==='ilgwan'?' <span style="color:#9fd">(×'+cfg.mult.toFixed(1)+' 관통)</span>':'')+(gq.g?' <span style="color:#aab">(상대가 막아냈다 — 절반)</span>':'')+(r.crit?' <b style="color:#ffd866">크리티컬!</b>':''));
    if(act.type==='gyeokmul'&&t.hp>0){t.weak=S.scanboost?4:3;await bmsg(t.name+'의 논리적 약점이 드러났다! (받는 피해 증가'+(S.scanboost?' · 돋보기 연장':'')+')');}
    if(t.hp<=0){fxAdd('pop',t);await bmsg(t.name+'을(를) 해치웠다!');}
  }
  else if(act.type==='geogyeong'){
    P.mp-=SKILLS.geogyeong.mp;P.buffGyeong=3;updateHud();
    fxAdd('shield',null);sfx.shield();

async function tryCounter(e){
  if(!P.counter)return false;
  P.counter=false;
  fxAdd('paper',null);sfx.slash();
  await bmsg(e.name+'의 공격 — <b>술이부작</b>! 「공자께서 이르시길—」 인용으로 받아쳤다!');
  const r=calcDmg(atkNow(),1.5,e.def,P.luk);
  e.hp=Math.max(0,e.hp-r.d);e.shake=10;e.flash=6;sfx.hit();
  await bmsg('반격! '+e.name+'에게 '+r.d+'의 데미지!');
  if(e.hp<=0){fxAdd('pop',e);await bmsg(e.name+'을(를) 해치웠다!');}
  return true;
}
async function eHitP(e,mult,prefix,noDodge,noGuard){
  // 공통 피해 처리: 회피(마감력) → 피해 → 통찰 가드(절반)
  if(!noDodge&&eMiss(e)){await bmsg(e.name+'의 공격 — 연구는 마감력으로 회피했다!');return null;}
  const ea=e.debAtk>0?Math.floor(e.atk*0.85):e.atk;
  const r=calcDmg(ea,mult,defNow(),3);let d=r.d;let g=false;
  if(P.overwork>0)d=Math.floor(d*(1+0.08*P.overwork));
  if(!noGuard){const lg=lukGuard(d);d=lg.d;g=lg.g;}
  P.hp=Math.max(0,P.hp-d);sfx.hit();updateHud();
  await bmsg(prefix+' '+d+'의 데미지!'+(g?' <span style="color:#7fc4ff">(통찰로 흘려냈다 — 절반)</span>':'')+(r.crit?' 아프다!':''));
  return d;
}

function camera(){
  const m=M(),mw=m.w*TILE,mh=m.h*TILE,vw=VW*TILE,vh=VH*TILE;
  let cx,cy;
  if(mw<=vw)cx=(mw-vw)/2;
  else cx=Math.max(0,Math.min(P.fx+TILE/2-vw/2,mw-vw));
  if(mh<=vh)cy=(mh-vh)/2;

  return {cx,cy};
}

function renderMap(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,256,192);

  const x0=Math.floor(cam.cx/TILE),y0=Math.floor(cam.cy/TILE);
  for(let y=y0;y<=y0+VH;y++)for(let x=x0;x<=x0+VW;x++){

    if(t===null)continue;
    ctx.drawImage(tileImg(t,x,y),Math.round(x*TILE-cam.cx),Math.round(y*TILE-cam.cy));
  }

function renderBattle(){
  const caption=battleBg();
  if(!B)return;
  const aliveE=B.enemies.filter(e=>e.hp>0);
  const n=aliveE.length;
  aliveE.forEach((e,i)=>{
    const img=A.enemy[e.key];
    const w=Math.max(70,img.width+28);
    const x0=Math.round(128-(n*w)/2+i*w+(w-img.width)/2);
    const bounce=B.boss?0:(e.key==='slime'||e.key==='dust'?(Math.sin(animT/220+i)*2|0):(Math.sin(animT/300+i)*3|0));
    let sx=0;if(e.shake>0){sx=(e.shake%2?2:-2);e.shake--;}
    const y=(B.boss?118-img.height:86)+bounce;
    e.sx=x0+img.width/2;e.sy=y+img.height/2;
    ctx.drawImage(img,x0+sx,y);
    if(e.flash>0){ctx.drawImage(tintWhite(img,.7),x0+sx,y);e.flash--;}
    const bw=Math.min(40,img.width);
    const bx=Math.round(e.sx-bw/2);
    const by=B.boss?y-8:y+img.height+3;
    ctx.fillStyle='#0a0a18';ctx.fillRect(bx,by,bw,4);
    ctx.fillStyle=e.hp/e.maxhp>0.4?'#56d364':'#e24b4a';
    ctx.fillRect(bx,by,Math.max(1,bw*e.hp/e.maxhp),4);
  });
  renderFx();
  ctx.fillStyle='rgba(10,10,24,.55)';ctx.fillRect(54,4,148,14);
  ctx.fillStyle='#dde';ctx.font='9px sans-serif';ctx.textAlign='center';
  ctx.fillText(caption,128,14);
  ctx.textAlign='left';
}
function renderFx(){
  const now=performance.now();
  for(let i=BFX.length-1;i>=0;i--){
    const f=BFX[i];const age=now-f.t0;
    const x=f.e?f.e.sx:128, y=f.e?f.e.sy:150;
    if(f.type==='slash'&&age<360){
      const p=age/360;ctx.strokeStyle='rgba(255,255,255,'+(1-p)+')';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(x-20+p*8,y-22+p*4);ctx.lineTo(x+16-p*4,y+16-p*4);ctx.stroke();
      ctx.strokeStyle='rgba(255,230,150,'+(0.8-p*0.8)+')';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(x-14,y-18);ctx.lineTo(x+20,y+12);ctx.stroke();
    }
    else if(f.type==='book'&&age<620){
      const p=age/620;
      ctx.strokeStyle='rgba(255,216,102,'+(1-p)+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x,y,6+p*26,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(255,216,102,'+(1-p)+')';
      ctx.font='bold 13px serif';ctx.textAlign='center';
      ctx.fillText('格',x-9,y-8-p*22);ctx.fillText('知',x+10,y-2-p*28);
      ctx.textAlign='left';
    }
    else if(f.type==='shield'&&age<700){
      const p=age/700;
      ctx.strokeStyle='rgba(127,196,255,'+(1-p)+')';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(128,196,46-p*8,Math.PI*1.15,Math.PI*1.85);ctx.stroke();
      ctx.fillStyle='rgba(127,196,255,'+(0.9-p*0.9)+')';ctx.font='bold 12px serif';
      ctx.textAlign='center';ctx.fillText('心',128,168-p*14);ctx.textAlign='left';
    }
    else if(f.type==='scan'&&age<800){
      const p=age/800;
      ctx.strokeStyle='rgba(100,230,255,'+(1-p)+')';ctx.lineWidth=1;
      ctx.strokeRect(x-22,y-22,44,44);
      ctx.fillStyle='rgba(100,230,255,'+(0.7-p*0.7)+')';
      ctx.fillRect(x-22,y-22+((age/60)%44),44,2);
    }
    else if(f.type==='paper'&&age<700){
      const p=age/700;
      ctx.fillStyle='rgba(244,241,230,'+(1-p)+')';
      for(let j=0;j<4;j++){
        const a=p*3+j*1.6;
        ctx.fillRect(128+Math.cos(a)*30,176+Math.sin(a)*12-p*10,7,9);
      }
      ctx.fillStyle='rgba(255,216,102,'+(1-p)+')';ctx.font='bold 10px serif';
      ctx.textAlign='center';ctx.fillText('註',128,168-p*8);ctx.textAlign='left';
    }
    else if(f.type==='wave'&&age<560){
      const p=age/560;
      ctx.fillStyle='rgba(127,196,255,'+(0.55-p*0.55)+')';
      ctx.fillRect(0,60,256*p,34);
      ctx.fillStyle='rgba(226,120,100,'+(0.55-p*0.55)+')';
      ctx.fillRect(256-256*p,96,256*p,34);
      ctx.fillStyle='rgba(255,255,255,'+(1-p)+')';ctx.font='bold 12px serif';
      ctx.textAlign='center';
      ctx.fillText('治',40+p*170,80);ctx.fillText('平',216-p*170,116);
      ctx.textAlign='left';
    }
    else if(f.type==='drink'&&age<600){
      const p=age/600;ctx.fillStyle='rgba(86,211,100,'+(1-p)+')';
      for(let j=0;j<5;j++)ctx.fillRect(110+j*9,184-p*30-(j%3)*6,3,3);
    }
    else if(f.type==='pop'&&age<420){
      const p=age/420;ctx.fillStyle='rgba(255,255,255,'+(1-p)+')';
      for(let j=0;j<8;j++){
        const a=j/8*Math.PI*2;
        ctx.fillRect(x+Math.cos(a)*p*26,y+Math.sin(a)*p*22,3,3);
      }
    }
    else if(f.type==='eatk'&&age<260){
      const p=age/260;ctx.fillStyle='rgba(226,75,74,'+(0.5-p*0.5)+')';
      ctx.fillRect(0,150+p*42,256,42-p*42);
    }
    if(age>820)BFX.splice(i,1);
  }
}
function loop(t){
  const dt=t-lastT;lastT=t;animT=t;
  if(['map','dialog','menu','fieldmenu'].includes(MODE)){
    if(MODE==='map')tryMove();
    if(P.moving){
      P.mt+=dt/140;
      if(P.mt>=1)stepDone();
      else{P.fx=(P.x+(P.tx-P.x)*P.mt)*TILE;P.fy=(P.y+(P.ty-P.y)*P.mt)*TILE;}
    }
    renderMap();
  }else if(MODE==='battle'){
    renderBattle();
  }else if(MODE==='fishing'){
    renderFishing(dt);
  }else if(MODE==='flash'){
    if(B)renderBattle();else renderMap();
    if(flashOn){ctx.fillStyle=flashColor;ctx.fillRect(0,0,256,192);}
  }
  requestAnimationFrame(loop);
}

});
