function calcDmg(atk,mult,def,luk,ignoreDef){
  let d=Math.floor(atk*mult*(0.9+Math.random()*0.2));
  if(!ignoreDef) d-=def;
  let crit=false;

function beep(f,dur=0.07,type='square',vol=0.05){
  try{

    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.value=f;g.gain.value=vol;
    o.connect(g);g.connect(AC.destination);o.start();
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    o.stop(AC.currentTime+dur);
  }catch(e){}
}

function buildChar(){
  const HAIR='#2b2b33',SKIN='#f0c8a0',HOOD='#26456e',HOODL='#3a6ea5',PANTS='#2b2b33',BAG='#7a4a2b';
  function frame(dir,step){
    const c=mkC(16,16),g=c.getContext('2d');
    const legUp=step?1:0;
    if(dir==='down'||dir==='up'){
      px(g,4,13,3,3,PANTS);px(g,9,13,3,3,PANTS);
      if(step){px(g,4,12,3,3,PANTS);px(g,9,14,3,2,PANTS);}
      px(g,3,7,10,6,HOOD);
      px(g,2,8,1,4,HOOD);px(g,13,8,1,4,HOOD);
      if(dir==='down'){
        px(g,5,7,6,1,HOODL);
        px(g,4,1,8,5,HAIR);px(g,4,4,8,3,SKIN);px(g,4,3,1,2,HAIR);px(g,11,3,1,2,HAIR);
        px(g,5,5,1,1,'#222');px(g,9,5,1,1,'#222');
        px(g,7,12,2,1,HOODL);
      }else{
        px(g,3,8,10,2,BAG);px(g,4,9,8,3,'#92602f');
        px(g,4,1,8,6,HAIR);
        px(g,5,7,6,1,HOODL);
      }
      px(g,4,1,8,1,'rgba(255,255,255,.12)');
    }else{
      px(g,5,13,3,3,PANTS);px(g,8+legUp,12+legUp,3,4-legUp,PANTS);
      px(g,4,7,9,6,HOOD);
      px(g,11,8,2,4,BAG);
      px(g,4,9,2,3,SKIN);
      px(g,4,1,8,5,HAIR);px(g,4,4,5,3,SKIN);px(g,9,3,3,4,HAIR);
      px(g,5,5,1,1,'#222');
      if(dir==='right'){
        const m=mkC(16,16),mg=m.getContext('2d');
        mg.translate(16,0);mg.scale(-1,1);mg.drawImage(c,0,0);
        return m;
      }
    }
    return c;
  }
  ['down','up','left','right'].forEach(d=>{A.char[d]=[frame(d,false),frame(d,true)];});
}

const keys={};let dirHeld=null;
window.addEventListener('keydown',e=>{
  const k=e.key;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k))e.preventDefault();
  keys[k]=true;
  if(k==='ArrowUp'||k==='w')dirHeld='up';
  if(k==='ArrowDown'||k==='s')dirHeld='down';
  if(k==='ArrowLeft'||k==='a')dirHeld='left';
  if(k==='ArrowRight'||k==='d')dirHeld='right';
  if(k==='z'||k==='Z'||k==='Enter')pressA();
  if(k==='x'||k==='X')pressB();
  if(menuBtns.length)menuKey(k);
});
window.addEventListener('keyup',e=>{
  keys[e.key]=false;
  const m={ArrowUp:'up',w:'up',ArrowDown:'down',s:'down',ArrowLeft:'left',a:'left',ArrowRight:'right',d:'right'};
  if(m[e.key]===dirHeld){dirHeld=null;for(const kk in m)if(keys[kk])dirHeld=m[kk];}
});

let menuBtns=[],menuIdx=0,menuCancel=null;
function bindBtns(container,cancelFn){
  menuBtns=[...container.querySelectorAll('button.gbtn')];
  menuIdx=menuBtns.findIndex(b=>!b.disabled);if(menuIdx<0)menuIdx=0;
  menuCancel=cancelFn||null;setFocus();
}
function setFocus(){menuBtns.forEach((b,i)=>{b.classList.toggle('focused',i===menuIdx);if(i===menuIdx&&b.scrollIntoView)b.scrollIntoView({block:'nearest'});});}
function menuKey(k){
  if(!menuBtns.length)return;
  if(['ArrowRight','ArrowDown','d','s'].includes(k)){let g=0;do{menuIdx=(menuIdx+1)%menuBtns.length;}while(menuBtns[menuIdx].disabled&&++g<20);setFocus();}
  if(['ArrowLeft','ArrowUp','a','w'].includes(k)){let g=0;do{menuIdx=(menuIdx-1+menuBtns.length)%menuBtns.length;}while(menuBtns[menuIdx].disabled&&++g<20);setFocus();}
}
function clickFocused(){const b=menuBtns[menuIdx];if(b&&!b.disabled)b.click();}
function openMenu(msg,items,cancelFn){
  if(MODE==='map')MODE='menu';
  $('menuMsg').innerHTML=msg;
  const box=$('menuBtns');box.innerHTML='';
  items.forEach(it=>{
    const b=document.createElement('button');b.className='gbtn';b.innerHTML=it.label;
    if(it.disabled)b.disabled=true;
    b.addEventListener('click',()=>{if(!b.disabled){sfx.ok();it.fn();}});
    box.appendChild(b);
  });
  bindBtns(box,cancelFn);
  $('menuBox').style.display='block';
}
function closeMenu(){$('menuBox').style.display='none';$('menuBtns').innerHTML='';menuBtns=[];menuCancel=null;}

function tileAt(x,y){const m=M();if(x<0||y<0||x>=m.w||y>=m.h)return null;return m.tiles[y][x];}
function npcAt(x,y){return (NPCS[CUR]||[]).find(n=>n.x===x&&n.y===y&&(!n.cond||n.cond()));}
function passable(x,y){const t=tileAt(x,y);return t!==null&&!SOLID[t]&&!npcAt(x,y);}
function tryMove(){
  if(P.moving||!dirHeld)return;
  P.dir=dirHeld;
  const dd={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[dirHeld];
  const nx=P.x+dd[0],ny=P.y+dd[1];
  if(!passable(nx,ny))return;
  P.tx=nx;P.ty=ny;P.moving=true;P.mt=0;
}
let toast='',toastT=0;
async function goMap(to,x,y,d){
  MODE='flash';flashColor='rgba(0,0,0,1)';
  flashOn=true;await sleep(240);
  CUR=to;P.x=x;P.y=y;P.tx=x;P.ty=y;P.fx=x*TILE;P.fy=y*TILE;P.moving=false;if(d)P.dir=d;
  toast=M().name;toastT=performance.now();
  flashOn=false;MODE='map';sfx.step();
}
function stepDone(){
  P.x=P.tx;P.y=P.ty;P.fx=P.x*TILE;P.fy=P.y*TILE;P.moving=false;
  const wp=(WALKP[CUR]||{})[P.x+','+P.y];
  if(wp){
    if(wp.lock&&wp.lock()){sfx.ok();showDialog('',wp.msg||['잠겨 있다.']);return;}
    goMap(wp.to,wp.x,wp.y,wp.d);return;
  }
  if(CUR==='quad'&&tileAt(P.x,P.y)==='G'&&Math.random()<1/40){catEvent();return;}
  const z=encFor();
  if(z&&z.tiles.includes(tileAt(P.x,P.y))&&Math.random()<z.rate)startEncounter();
}
function catEvent(){
  sfx.heal();
  const isOlli=Math.random()<0.5;
  const name=isOlli?'올리':'꽈이꽈이';
  if(isOlli)S.olli++;else S.kwai++;
  const buff=Math.random()<(isOlli?0.75:0.65);
  const lines=['잔디 사이에서 주황 털뭉치가 튀어나왔다!','진저캣 <'+name+'>다! ('+(isOlli?S.olli:S.kwai)+'번째 만남)'];
  if(buff){
    const roll=Math.random();
    if(roll<0.4){P.gold+=3000;lines.push(name+'가 물어온 털뭉치 속에서 지폐가 나왔다?! (+₩3,000)');}
    else if(roll<0.75){P.inv.miller++;lines.push(name+'가 어디선가 밀러 라이트를 굴려왔다. …편의점 털었니? (밀러 라이트 +1)');}
    else{P.buffAtk=Math.max(P.buffAtk,3);lines.push(name+'가 힘차게 부비적댄다! 투지가 솟는다. (다음 전투 ATK +25%, 3턴)');}
  }else{
    const roll=Math.random();
    if(roll<0.4){P.mp=Math.max(0,P.mp-5);lines.push(name+'가 노트북 키보드 위에 앉아버렸다… 진도가 밀렸다. (MP −5)');}
    else if(roll<0.7){const c=Math.min(P.gold,1000);P.gold-=c;lines.push(name+'가 츄르를 요구한다. 거절할 수 없었다. (−'+fmt(c)+')');}
    else{P.hangover=true;lines.push(name+'의 털이 코로 들어갔다… 에취! 머리가 멍하다. (다음 전투 첫 행동 불가)');}
  }
  if(!S.charm&&S.olli>=5&&S.kwai>=5){
    S.charm=1;P.luk+=10;P.spd+=3;
    lines.push('…올리와 꽈이꽈이가 나란히 앉아 그르릉거린다.');
    lines.push('<주황 털뭉치 부적>을 얻었다! 통찰(LUK) 영구 +10, 마감력(SPD) 영구 +3!');
    lines.push('고양이의 직감과 발걸음이 깃들었다.');
  }
  updateHud();
  showDialog(name,lines,null,A.npc[isOlli?'olli':'kwai']);
}

function tryInteract(){
  const f=facingTile();
  const npc=npcAt(f.x,f.y);
  if(npc){npcTalk(npc.kind);return;}
  const dp=(DOORP[CUR]||{})[f.x+','+f.y];
  const t=tileAt(f.x,f.y);
  if(dp&&t==='D'){sfx.ok();goMap(dp.to,dp.x,dp.y,dp.d);return;}
  if(t==='L'){labMenu();return;}
  if(t==='E'){dormMenu();return;}
  if(t==='W'){sfx.ok();showDialog('',['좌판에 술병이 가지런히 놓여 있다.','점주에게 말을 걸자.']);return;}
  if(t==='A'){travelMenu();return;}
  if(t==='H'){hiddenPagoda(f.x,f.y);return;}
  if(t==='V'){vendingShop(CUR==='prelim'?['miller','yuengling']:['soju','beer']);return;}
  if(t==='O'){sfx.heal();openFieldMenu();fmView('save');return;}
  if(t==='X'){openChest(f.x,f.y);return;}
  if(t==='J'){if(CUR==='prelim')prelimJudge();else hallJudge();return;}
  if(t==='S'){sfx.ok();showDialog('',['계단이다. 밟으면 이동한다.']);return;}
}

function openChest(x,y){
  const key=CUR+':'+x+','+y;
  if(S.chests[key]){sfx.ok();showDialog('',['상자는 비어 있다.']);return;}
  const c=CHEST_DB[key];
  if(!c){sfx.ok();showDialog('',['열리지 않는다.']);return;}
  S.chests[key]=1;sfx.lvl();
  if(c.gold)P.gold+=c.gold;
  if(c.item)P.inv[c.item]=(P.inv[c.item]||0)+c.n;
  if(c.note)P.atk+=3;
  if(c.stat){
    if(c.stat.hp){P.maxhp+=c.stat.hp;P.hp+=c.stat.hp;}
    if(c.stat.mp){P.maxmp+=c.stat.mp;P.mp+=c.stat.mp;}
    if(c.stat.spd)P.spd+=c.stat.spd;
    if(c.stat.def)P.def+=c.stat.def;
    if(c.stat.luk)P.luk+=c.stat.luk;
  }
  updateHud();
  showDialog('',c.text.split('|'));
}

function jksShop(){

let B=null;const BFX=[];
function weightedGroup(groups){
  const tot=groups.reduce((a,g)=>a+g.w,0);let r=Math.random()*tot;
  for(const g of groups){if((r-=g.w)<0)return g.e;}
  return groups[0].e;
}

function mkE(key,suffix){
  const d=ENEMY_DB[key];
  return {...d,name:d.name+(suffix||''),maxhp:d.hp,hp:d.hp,weak:0,noGuard:0,debAtk:0,shake:0,flash:0,sx:0,sy:0,tc:0};

function mkGroup(keysE){
  const cnt={};
  return keysE.map(k=>{
    cnt[k]=(cnt[k]||0)+1;
    const sameTotal=keysE.filter(x=>x===k).length;
    return mkE(k,sameTotal>1?' '+String.fromCharCode(64+cnt[k]):'');
  });
}

  }
  if(B.enemies.some(e=>e.preempt)&&Math.random()<0.3){
    await bmsg('카톡 알림이 쉴 새 없이 울린다! 기습이다!');
    for(const e of alive()){await enemyAct(e);if(P.hp<=0)return defeat();}
  }
  while(true){
    const act=await playerCommand();
    if(act.type==='run'){
      if(B.noRun){await bmsg(B.noRunMsg||'도망칠 수 없다!');continue;}
      const ms=Math.max(...alive().map(e=>e.spd));
      const rc=Math.min(1,0.7+Math.max(0,P.spd-ms)*0.05);
      if(Math.random()<rc){
        await bmsg(rc>=1?'압도적인 마감력 — 여유롭게 읽씹하고 자리를 떴다.':'읽씹하고 자리를 떴다…');
        return endBattle();
      }
      await bmsg('도망칠 수 없다! 알림은 어디든 따라온다!');
    }
    const order=[{p:true,spd:P.spd},...alive().map(e=>({e,spd:e.spd}))].sort((a,b)=>b.spd-a.spd);
    for(const o of order){
      if(B.over)break;
      if(o.p){if(act.type!=='run')await playerAct(act);}
      else if(o.e.hp>0){await enemyAct(o.e);if(P.hp<=0)return defeat();}
      if(!alive().length)break;
    }
    if(!alive().length){
      tallyBank();
      if(B.waves&&B.waves.length){
        sfx.enc();
        await bmsg(B.waveMsg||'다음 상대가 나타났다!',900);
        B.enemies=mkGroup(B.waves.shift());
        roundEnd();continue;
      }
      return victoryFinal();
    }
    roundEnd();
  }
}
function roundEnd(){
  if(S.chests['union4:11,4']&&P.mp<P.maxmp){P.mp=Math.min(P.maxmp,P.mp+5);updateHud();}
  if(P.buffGyeong>0)P.buffGyeong--;
  if(P.buffAtk>0)P.buffAtk--;
  if(P.debuffAtk>0)P.debuffAtk--;
  if(P.silence>0)P.silence--;
  P.counter=false;
  if(B){
    B.spiked=false;
    B.enemies.forEach(e=>{if(e.weak>0)e.weak--;if(e.noGuard>0)e.noGuard--;if(e.debAtk>0)e.debAtk--;});
  }
}
async function bossLoop(){
  const BD=BOSS_DEF[B.bossKind];
  await bmsg(BD.intro[0],950);
  await bmsg(BD.intro[1]);
  while(true){
    const act=await playerCommand();
    if(act.type==='run'){await bmsg('「앉으세요.」 — 심사 중에는 도망칠 수 없다!');continue;}
    const order=[{p:true,spd:P.spd},...alive().map(e=>({e,spd:e.spd}))].sort((a,b)=>b.spd-a.spd);
    for(const o of order){
      if(B.over)break;
      if(o.p)await playerAct(act);
      else if(o.e.hp>0){await enemyAct(o.e);if(P.hp<=0)return defeat();}
      if(!alive().length)break;
    }
    if(!alive().length){
      if(B.phase===1){
        B.phase=2;sfx.enc();
        await bmsg(BD.p2msg[0],950);
        await bmsg(BD.p2msg[1]);
        B.enemies=BD.phase(2);
      }else if(B.phase===2){
        B.phase=3;sfx.enc();
        await bmsg(BD.p3msg[0],950);
        await bmsg(BD.p3msg[1],950);
        B.enemies=BD.phase(3);
      }else{
        return B.bossKind==='phd'?phdVictory():bossVictory();
      }
    }
    roundEnd();
  }
}
function defNow(){return P.buffGyeong>0?P.def*2:P.def;}
async function playerCommand(){

    if(P.silence>0)tags.push('<span style="color:#f0d080">침묵(스킬 불가)</span>');

    const top=await bchoice('어떻게 할까? '+status,[
      {label:'액션',value:'action'},{label:'아이템',value:'item'},{label:'도주',value:'run'}
    ]);
    if(top==='run')return{type:'run'};
    if(top==='action'){
      const MULT={gyeokmul:[1.8],jihaeng:[2.2],haeche:[1.8,true],sadan:[0.55,false,'×4'],igi:[1.0,false,'전체'],dongdo:[1.6,false,'전체']};
      const info=id=>{
        const s=SKILLS[id];
        if(id==='ilgwan'){
          const sp=ilgwanSpend();
          return sp<5?'MP 부족':('MP'+sp+' 소모 · 약 '+dmgRange(ilgwanMult())+'뎀');
        }
        const m=MULT[id];
        let txt='MP'+s.mp;
        if(m)txt+=' · '+(m[2]?m[2]+' ':'')+'약 '+dmgRange(m[0],m[1])+'뎀'+(m[2]==='×4'?'/타':'');

        return txt;
      };
      const acts=[{label:'평타 (논박) <small>약 '+dmgRange(1)+'뎀</small>',value:'attack'}];
      P.skills.forEach(id=>{

      });

      if(targeted[c]){

        const t=await pickTarget(TM[targeted[c]]);if(t==='__cancel__')continue;

      if(c==='sk_gyeongse')return{type:'gyeongse'};
      if(c==='sk_sadan')return{type:'sadan'};

      if(c==='sk_dongdo')return{type:'dongdo'};
    }

      const it=await bchoice('무엇을 마실까?',its,true);

    }
  }

async function pickTarget(m){
  const a=alive();
  if(a.length===1)return a[0];
  const items=a.map(e=>({label:e.name+' <small>HP '+e.hp+(m?' · 약 '+dmgRange(m[0],m[1],e)+'뎀':'')+(e.weak>0?' · <span style="color:#ffd866">약점</span>':'')+'</small>',value:e}));
  items.push({label:'← 뒤로',value:'__cancel__'});
  return await bchoice('누구를 논파할까?',items,true);
}
function atkNow(){return Math.floor((P.atk+wpn().atk)*(P.debuffAtk>0?0.85:1)*(P.buffAtk>0?1.25:1));}
function dmgRange(mult,ig,tgt){
  const a=atkNow();
  const t=tgt||(B?B.enemies.filter(e=>e.hp>0)[0]:null);
  const def=ig?0:(t?t.def:0);
  let lo=Math.max(1,Math.floor(a*mult*0.9)-def),hi=Math.max(1,Math.floor(a*mult*1.1)-def);
  if(t&&t.weak>0){lo=Math.floor(lo*1.2);hi=Math.floor(hi*1.2);}
  return lo+'~'+hi;
}
function ilgwanSpend(){return Math.floor(P.mp/2);}
function ilgwanMult(){return Math.min(4,1+ilgwanSpend()*0.07);}
function hitChance(aspd,dspd){return Math.max(0.75,Math.min(0.98,0.92+(aspd-dspd)*0.012));}
function pMiss(t){return Math.random()>hitChance(P.spd,t.spd);}
function eMiss(e){return Math.random()>hitChance(e.spd,P.spd);}
function lukGuard(d){if(Math.random()*100<P.luk)return{d:Math.max(1,Math.floor(d/2)),g:true};return{d,g:false};}
function enemyGuard(t,d){if(t.noGuard>0)return{d,g:false};if(t.guard&&Math.random()<t.guard)return{d:Math.max(1,Math.floor(d/2)),g:true};return{d,g:false};}

async function gainLevels(){
  while(P.lv<20&&P.xp>=NEXT_XP[P.lv-1]){
    P.xp-=NEXT_XP[P.lv-1];P.lv++;
    P.maxhp+=12;P.maxmp+=4;P.atk+=2;P.def=Math.floor(P.def+1.5);P.spd+=1;P.luk=Math.floor(P.luk+0.5);
    P.hp=P.maxhp;P.mp=P.maxmp;sfx.lvl();updateHud();
    await bmsg('<b style="color:#ffd866">레벨 업! Lv '+P.lv+'</b> — 논증력이 단단해졌다!');
    for(const id in SKILLS){
      if(SKILLS[id].lv===P.lv&&!P.skills.includes(id)){
        P.skills.push(id);
        await bmsg('『주자어류』 새 장이 펼쳐졌다 — 스킬 <b>'+SKILLS[id].name+'</b> 습득!');
      }
    }
  }
}

let lastT=0,animT=0;
function camera(){
  const m=M(),mw=m.w*TILE,mh=m.h*TILE,vw=VW*TILE,vh=VH*TILE;
  let cx,cy;
  if(mw<=vw)cx=(mw-vw)/2;
  else cx=Math.max(0,Math.min(P.fx+TILE/2-vw/2,mw-vw));
  if(mh<=vh)cy=(mh-vh)/2;
  else cy=Math.max(0,Math.min(P.fy+TILE/2-vh/2,mh-vh));
  return {cx,cy};
}
function tileImg(t,x,y){
  if(t==='G'){const h=(x*31+y*17)%7;return h===0?A.tiles.G2:(h%2?A.tiles.G0:A.tiles.G1);}
  if(t==='X'&&S.chests[CUR+':'+x+','+y])return A.tiles.Xo;
  return A.tiles[t]||A.tiles.G0;
}
function renderMap(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,256,192);
  const cam=camera();
  const x0=Math.floor(cam.cx/TILE),y0=Math.floor(cam.cy/TILE);
  for(let y=y0;y<=y0+VH;y++)for(let x=x0;x<=x0+VW;x++){
    const t=tileAt(x,y);
    if(t===null)continue;
    ctx.drawImage(tileImg(t,x,y),Math.round(x*TILE-cam.cx),Math.round(y*TILE-cam.cy));
  }
  for(const n of (NPCS[CUR]||[])){
    if(n.cond&&!n.cond())continue;
    const img=A.npc[n.kind];
    if(img)ctx.drawImage(img,Math.round(n.x*TILE-cam.cx),Math.round(n.y*TILE-cam.cy));
  }
  const f=(P.moving&&Math.floor(animT/120)%2===0)?1:0;
  ctx.drawImage(A.char[P.dir][f],Math.round(P.fx-cam.cx),Math.round(P.fy-cam.cy));
  if(CUR==='campus'&&S.night){
    ctx.fillStyle='rgba(10,14,52,.48)';ctx.fillRect(0,0,256,192);
    ctx.fillStyle='rgba(255,240,180,.08)';
    ctx.beginPath();ctx.arc(P.fx-cam.cx+8,P.fy-cam.cy+8,34,0,Math.PI*2);ctx.fill();
  }
  if(CUR==='stacks'){
    ctx.fillStyle='rgba(14,10,30,.34)';ctx.fillRect(0,0,256,192);
  }
  if(toast&&performance.now()-toastT<1600){
    const a=Math.min(1,(1600-(performance.now()-toastT))/400);
    ctx.fillStyle='rgba(10,10,24,'+(0.72*a)+')';ctx.fillRect(58,84,140,20);
    ctx.fillStyle='rgba(255,216,102,'+a+')';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('— '+toast+(CUR==='campus'&&S.night?' · 밤':'')+' —',128,98);ctx.textAlign='left';
  }
}

    ctx.fillStyle='#2e2218';for(let i=0;i<6;i++)ctx.fillRect(0,112+i*13,256,1);
    return '일리니 유니언 '+CUR.slice(5)+'층';
  }
  if(CUR==='green'){
    ctx.fillStyle='#2a2348';ctx.fillRect(0,0,256,110);
    ctx.fillStyle='#ffd866';ctx.fillRect(50,14,4,4);ctx.fillRect(190,10,4,4);
    ctx.fillStyle='#1c1c30';ctx.fillRect(8,38,80,66);ctx.fillRect(168,34,80,70);
    ctx.fillStyle='#56d364';ctx.fillRect(20,50,34,10);
    ctx.fillStyle='#fff';ctx.font='7px sans-serif';ctx.fillText("MURPHY'S",22,58);
    ctx.fillStyle='#ffd866';ctx.fillRect(180,46,40,12);
    ctx.fillStyle='#1a1a22';ctx.font='bold 8px sans-serif';ctx.fillText("JK'S",190,55);
    ctx.fillStyle='#d8553a';ctx.fillRect(100,52,56,12);
    ctx.fillStyle='#fff';ctx.font='8px sans-serif';ctx.fillText('GREEN ST',104,61);
    ctx.fillStyle='#3a3530';ctx.fillRect(0,104,256,88);
    ctx.fillStyle='#2c2825';for(let i=0;i<6;i++)ctx.fillRect(0,112+i*13,256,1);
    return '그린 스트리트 · 저녁';
  }
  if(CUR==='library'||CUR==='stacks'||CUR==='asianlib'){
    ctx.fillStyle=CUR==='stacks'?'#1d1828':'#3a3040';ctx.fillRect(0,0,256,110);
    for(let i=0;i<5;i++){
      const bx=10+i*50;
      ctx.fillStyle='#5c3a22';ctx.fillRect(bx,12,40,92);

      for(let y=18;y<98;y+=18)ctx.fillRect(bx+3,y,34,12);
      const cols=['#a84848','#3a6ea5','#56d364','#ffd866'];

    }
    ctx.fillStyle=CUR==='stacks'?'#221c30':'#4a4050';ctx.fillRect(0,104,256,88);
    if(CUR==='stacks'){ctx.fillStyle='rgba(10,8,24,.35)';ctx.fillRect(0,0,256,192);}
    return CUR==='stacks'?'깊은 서고 B2':(CUR==='asianlib'?'아시아도서관':'중앙도서관');

  if(CUR==='alley'){
    ctx.fillStyle='#2a2348';ctx.fillRect(0,0,256,110);

    ctx.fillStyle='#ffb84d';ctx.fillRect(22,56,12,12);ctx.fillRect(50,56,12,12);ctx.fillRect(186,52,12,12);ctx.fillRect(214,52,12,12);
    ctx.fillStyle='#d8553a';ctx.fillRect(96,52,64,12);

  if(S.night){
    ctx.fillStyle='#101436';ctx.fillRect(0,0,256,120);
    ctx.fillStyle='#fff';ctx.fillRect(40,20,2,2);ctx.fillRect(120,12,2,2);ctx.fillRect(200,28,2,2);ctx.fillRect(80,36,1,1);ctx.fillRect(170,44,1,1);
    ctx.fillStyle='#e8e4c8';ctx.beginPath();ctx.arc(210,26,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3a4458';ctx.fillRect(20,52,216,52);
    ctx.fillStyle='#2a1414';ctx.fillRect(14,44,228,12);

    ctx.fillStyle='#16301b';ctx.beginPath();ctx.ellipse(128,132,104,16,0,0,Math.PI*2);ctx.fill();

  }
  const grd=ctx.createLinearGradient(0,0,0,120);
  grd.addColorStop(0,'#8fb8e8');grd.addColorStop(1,'#cfe2f5');

}
function renderBattle(){
  const caption=battleBg();
  if(!B)return;
  const aliveE=B.enemies.filter(e=>e.hp>0);
  const n=aliveE.length;
  aliveE.forEach((e,i)=>{
    const img=A.enemy[e.key];
    const w=Math.max(70,img.width+28);
    const x0=Math.round(128-(n*w)/2+i*w+(w-img.width)/2);
    const bounce=B.boss?0:(e.key==='slime'||e.key==='dust'?(Math.sin(animT/220+i)*2|0):(Math.sin(animT/300+i)*3|0));
    let sx=0;if(e.shake>0){sx=(e.shake%2?2:-2);e.shake--;}
    const y=(B.boss?118-img.height:86)+bounce;
    e.sx=x0+img.width/2;e.sy=y+img.height/2;
    ctx.drawImage(img,x0+sx,y);
    if(e.flash>0){ctx.drawImage(tintWhite(img,.7),x0+sx,y);e.flash--;}
    const bw=Math.min(40,img.width);
    const bx=Math.round(e.sx-bw/2);
    const by=B.boss?y-8:y+img.height+3;
    ctx.fillStyle='#0a0a18';ctx.fillRect(bx,by,bw,4);
    ctx.fillStyle=e.hp/e.maxhp>0.4?'#56d364':'#e24b4a';
    ctx.fillRect(bx,by,Math.max(1,bw*e.hp/e.maxhp),4);
  });
  renderFx();
  ctx.fillStyle='rgba(10,10,24,.55)';ctx.fillRect(54,4,148,14);
  ctx.fillStyle='#dde';ctx.font='9px sans-serif';ctx.textAlign='center';
  ctx.fillText(caption,128,14);
  ctx.textAlign='left';
}
function renderFx(){
  const now=performance.now();
  for(let i=BFX.length-1;i>=0;i--){
    const f=BFX[i];const age=now-f.t0;
    const x=f.e?f.e.sx:128, y=f.e?f.e.sy:150;
    if(f.type==='slash'&&age<360){
      const p=age/360;ctx.strokeStyle='rgba(255,255,255,'+(1-p)+')';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(x-20+p*8,y-22+p*4);ctx.lineTo(x+16-p*4,y+16-p*4);ctx.stroke();
      ctx.strokeStyle='rgba(255,230,150,'+(0.8-p*0.8)+')';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(x-14,y-18);ctx.lineTo(x+20,y+12);ctx.stroke();
    }
    else if(f.type==='book'&&age<620){
      const p=age/620;
      ctx.strokeStyle='rgba(255,216,102,'+(1-p)+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x,y,6+p*26,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(255,216,102,'+(1-p)+')';
      ctx.font='bold 13px serif';ctx.textAlign='center';
      ctx.fillText('格',x-9,y-8-p*22);ctx.fillText('知',x+10,y-2-p*28);
      ctx.textAlign='left';
    }
    else if(f.type==='shield'&&age<700){
      const p=age/700;
      ctx.strokeStyle='rgba(127,196,255,'+(1-p)+')';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(128,196,46-p*8,Math.PI*1.15,Math.PI*1.85);ctx.stroke();
      ctx.fillStyle='rgba(127,196,255,'+(0.9-p*0.9)+')';ctx.font='bold 12px serif';
      ctx.textAlign='center';ctx.fillText('心',128,168-p*14);ctx.textAlign='left';
    }
    else if(f.type==='scan'&&age<800){
      const p=age/800;
      ctx.strokeStyle='rgba(100,230,255,'+(1-p)+')';ctx.lineWidth=1;
      ctx.strokeRect(x-22,y-22,44,44);
      ctx.fillStyle='rgba(100,230,255,'+(0.7-p*0.7)+')';
      ctx.fillRect(x-22,y-22+((age/60)%44),44,2);
    }
    else if(f.type==='paper'&&age<700){
      const p=age/700;
      ctx.fillStyle='rgba(244,241,230,'+(1-p)+')';
      for(let j=0;j<4;j++){
        const a=p*3+j*1.6;
        ctx.fillRect(128+Math.cos(a)*30,176+Math.sin(a)*12-p*10,7,9);
      }
      ctx.fillStyle='rgba(255,216,102,'+(1-p)+')';ctx.font='bold 10px serif';
      ctx.textAlign='center';ctx.fillText('註',128,168-p*8);ctx.textAlign='left';
    }
    else if(f.type==='wave'&&age<560){
      const p=age/560;
      ctx.fillStyle='rgba(127,196,255,'+(0.55-p*0.55)+')';
      ctx.fillRect(0,60,256*p,34);
      ctx.fillStyle='rgba(226,120,100,'+(0.55-p*0.55)+')';
      ctx.fillRect(256-256*p,96,256*p,34);
      ctx.fillStyle='rgba(255,255,255,'+(1-p)+')';ctx.font='bold 12px serif';
      ctx.textAlign='center';
      ctx.fillText('治',40+p*170,80);ctx.fillText('平',216-p*170,116);
      ctx.textAlign='left';
    }
    else if(f.type==='drink'&&age<600){
      const p=age/600;ctx.fillStyle='rgba(86,211,100,'+(1-p)+')';
      for(let j=0;j<5;j++)ctx.fillRect(110+j*9,184-p*30-(j%3)*6,3,3);
    }
    else if(f.type==='pop'&&age<420){
      const p=age/420;ctx.fillStyle='rgba(255,255,255,'+(1-p)+')';
      for(let j=0;j<8;j++){
        const a=j/8*Math.PI*2;
        ctx.fillRect(x+Math.cos(a)*p*26,y+Math.sin(a)*p*22,3,3);
      }
    }
    else if(f.type==='eatk'&&age<260){
      const p=age/260;ctx.fillStyle='rgba(226,75,74,'+(0.5-p*0.5)+')';
      ctx.fillRect(0,150+p*42,256,42-p*42);
    }
    if(age>820)BFX.splice(i,1);
  }
}
function loop(t){
  const dt=t-lastT;lastT=t;animT=t;
  if(['map','dialog','menu','fieldmenu'].includes(MODE)){
    if(MODE==='map')tryMove();
    if(P.moving){
      P.mt+=dt/140;
      if(P.mt>=1)stepDone();
      else{P.fx=(P.x+(P.tx-P.x)*P.mt)*TILE;P.fy=(P.y+(P.ty-P.y)*P.mt)*TILE;}
    }
    renderMap();
  }else if(MODE==='battle'){
    renderBattle();
  }else if(MODE==='flash'){
    if(B)renderBattle();else renderMap();
    if(flashOn){ctx.fillStyle=flashColor;ctx.fillRect(0,0,256,192);}
  }
  requestAnimationFrame(loop);
}

  toast=M().name;toastT=performance.now();
  showDialog('',['안암의 봄. 입학식이 끝났다.','『주자어류』 한 권과 모나미 볼펜 — 이것이 전 재산이다.','북쪽 가운데가 본관. 그 아래 큰길 좌우 끝에 문과대와 도서관.','동쪽 아래엔 연구실, 남서쪽 길 끝엔 술집 골목이 있다.','잔디밭(초록)은 인카운터 구역. 골목엔 취객이 출몰한다.','X키(B버튼)로 메뉴를 열 수 있다. 먼저 완당 선생을 찾아가자.']);
});
updateHud();
requestAnimationFrame(loop);
</script>
